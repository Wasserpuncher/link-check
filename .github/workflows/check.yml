name: check
on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"   # weekly: links rot even when the code does not

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Unit tests (hermetic, no network)
        run: python -m unittest -v
      - name: link-check dogfoods its own README
        run: python link_check.py README.md --allow 429
